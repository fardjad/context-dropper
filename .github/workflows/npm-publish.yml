name: npm-publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: false
        type: string
      package:
        description: Package to publish
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for NPM provenance
      contents: read # Required for checkout

    steps:
      - uses: actions/checkout@main
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@main
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@main
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Publish
        env:
          INPUT_PACKAGE: ${{ inputs.package }}
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE="${INPUT_PACKAGE}"
          TAG="${INPUT_TAG:-$RELEASE_TAG}"

          if [ -z "$PACKAGE" ]; then
            case "$TAG" in
              context-dropper-v*) PACKAGE="context-dropper" ;;
              opencode-context-dropper-plugin-v*) PACKAGE="opencode-context-dropper-plugin" ;;
              *) echo "Unable to infer package from tag: $TAG" >&2; exit 1 ;;
            esac
          fi

          case "$PACKAGE" in
            context-dropper)
              PACKAGE_DIR="."
              ;;
            opencode-context-dropper-plugin)
              PACKAGE_DIR="opencode-plugin"
              ;;
            *) echo "Unsupported package: $PACKAGE" >&2; exit 1 ;;
          esac

          cd "$PACKAGE_DIR"
          bun install
          bun pm pack
          npm publish *.tgz --provenance --access public
