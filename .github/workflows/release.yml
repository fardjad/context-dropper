name: github-release

on:
  workflow_run:
    workflows: ["ci"]
    branches: [main]
    types:
      - completed

jobs:
  check-version-and-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Setup Bun
        uses: oven-sh/setup-bun@main
        with:
          bun-version: latest

      - name: Check version
        id: check_version
        run: |
          TAG_PREFIX="v"

          FILE_VERSION=$(bun pm pkg get version)
          FILE_VERSION="${FILE_VERSION%\"}"
          FILE_VERSION="${FILE_VERSION#\"}"
          FILE_VERSION="${FILE_VERSION#v}"

          TAG_VERSION="0.0.0"
          TAG=$(git tag --list "${TAG_PREFIX}*" --sort=-v:refname | head -n1)

          if [ -n "$TAG" ]; then
            TAG_VERSION="${TAG#${TAG_PREFIX}}"
          fi

          if [ "$(printf '%s\n' "$TAG_VERSION" "$FILE_VERSION" | sort -V | tail -n1)" = "$FILE_VERSION" ] && [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "context-dropper version is greater than the latest package tag."
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "context-dropper version is not greater than the latest package tag."
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

          echo "version=$FILE_VERSION" >> $GITHUB_OUTPUT
          echo "tag=${TAG_PREFIX}${FILE_VERSION}" >> $GITHUB_OUTPUT

      - name: Configure Git
        if: steps.check_version.outputs.version_changed == 'true'
        uses: fardjad/my-actions/configure-git@main

      - name: Create Git tag
        if: steps.check_version.outputs.version_changed == 'true'
        id: create_tag
        run: |
          TAG="${{ steps.check_version.outputs.tag }}"

          if git rev-parse $TAG >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping..."
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            git tag -a $TAG -m "Release v${{ steps.check_version.outputs.version }}"
            git push origin $TAG
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build latest binaries
        id: build_binaries
        if: steps.check_version.outputs.version_changed == 'true' && steps.create_tag.outputs.tag_exists != 'true'
        run: |
          bun install
          set -euo pipefail
          mkdir -p ./dist
          for target_map in \
            "bun-linux-x64:dist/context-dropper-linux-x64" \
            "bun-windows-x64:dist/context-dropper-windows-x64.exe" \
            "bun-darwin-x64:dist/context-dropper-macos-x64" \
            "bun-darwin-arm64:dist/context-dropper-macos-arm64" \
            "bun-linux-arm64:dist/context-dropper-linux-arm64" \
            "bun-windows-arm64:dist/context-dropper-windows-arm64.exe"
          do
            target="${target_map%%:*}"
            outfile="${target_map##*:}"
            echo "Building ${target} -> ${outfile}"
            bun build ./src/index.ts --compile --target="${target}" --outfile="${outfile}"
          done
          ARTIFACTS="dist/context-dropper-linux-x64 dist/context-dropper-windows-x64.exe dist/context-dropper-macos-x64 dist/context-dropper-macos-arm64 dist/context-dropper-linux-arm64 dist/context-dropper-windows-arm64.exe"
          echo "artifacts=${ARTIFACTS}" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.check_version.outputs.version_changed == 'true' && steps.create_tag.outputs.tag_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.check_version.outputs.tag }}
        run: |
          gh release create "${TAG}" ${{ steps.build_binaries.outputs.artifacts }} \
            --title "context-dropper ${{ steps.check_version.outputs.version }}" \
            --generate-notes

      - name: Trigger NPM publish
        if: steps.check_version.outputs.version_changed == 'true' && steps.create_tag.outputs.tag_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.check_version.outputs.tag }}
        run: gh workflow run npm-publish.yml --ref main -f "tag=${TAG}"
