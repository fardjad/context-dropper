name: automatic-bun-update

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 0 * * *"

jobs:
  update-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@main
        with:
          app-id: ${{ vars.AUTO_MAINTENANCE_APP_ID }}
          private-key: ${{ secrets.AUTO_MAINTENANCE_APP_PRIVATE_KEY }}
      - uses: oven-sh/setup-bun@main
        with:
          bun-version: latest
      - name: Cache Bun packages
        uses: actions/cache@main
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cli-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-cli-
            ${{ runner.os }}-bun-
      - uses: fardjad/my-actions/automatic-bun-update@main
        with:
          source-branch: automatic-bun-update-cli
          github-token: ${{ steps.app-token.outputs.token }}
          verify-script: |
            bun install
            bun run check
            bun run typecheck
            bun run test
            bun run build
          post-update-commands: |
            bun pm version patch --no-git-tag-version
            bun run fix

  update-opencode-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@main
        with:
          app-id: ${{ vars.AUTO_MAINTENANCE_APP_ID }}
          private-key: ${{ secrets.AUTO_MAINTENANCE_APP_PRIVATE_KEY }}
      - uses: oven-sh/setup-bun@main
        with:
          bun-version: latest
      - name: Cache Bun packages
        uses: actions/cache@main
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-opencode-plugin-${{ hashFiles('opencode-plugin/bun.lock', 'opencode-plugin/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-opencode-plugin-
            ${{ runner.os }}-bun-
      - uses: fardjad/my-actions/automatic-bun-update@main
        with:
          source-branch: automatic-bun-update-opencode-plugin
          github-token: ${{ steps.app-token.outputs.token }}
          working-directory: opencode-plugin
          verify-script: |
            bun install
            bun run check
            bun run typecheck
            bun run test
            bun run build
          post-update-commands: |
            bun pm version patch --no-git-tag-version
            bun run fix
